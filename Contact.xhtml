<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition template="/JobsTemplate.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="top">
        <h1>Contact Us</h1>
    </ui:define>

    <ui:define name="left">
        <h:link outcome="/index.xhtml" value="Home" />
        <h:link outcome="/Login.xhtml" value="Login" />
        <h:link outcome="/Jobs.xhtml" value="View Jobs" />
        <h:link outcome="/MyJobs.xhtml" value="My Jobs" />
        <h:link outcome="/Register.xhtml" value="Register" />
        <h:link outcome="/Contact.xhtml" value="Contact" />
        <h:link outcome="/Messages.xhtml" value="Messages" />
        <h:link outcome="/About.xhtml" value="About Us" />
    </ui:define>

    <ui:define name="content">

        <h2>Get in Touch</h2>
        <p>
            If you have any questions about Jobs Pool or encounter any issues,
            please use the form below to contact our team.
        </p>

        <h:form>

            <h:messages 
            errorClass="errorMessage"
            infoClass="successMessage"
            warnClass="warnMessage" />

            <h:outputLabel value="Your Name:" />
            <h:inputText value="#{contactBean.name}" required="true" />
            <br/><br/>

            <h:outputLabel value="Your Email:" />
            <h:inputText value="#{contactBean.email}" required="true">
                <f:validateRegex pattern="^[^@\s]+@[^@\s]+\.[^@\s]+$" />
            </h:inputText>
            <br/><br/>

            <h:outputLabel value="Message:" />
            <h:inputTextarea value="#{contactBean.message}" required="true" rows="5" cols="40"/>
            <br/><br/>

            <h:commandButton value="Send Message" action="#{contactBean.submit}" />

        </h:form>

    </ui:define>

</ui:composition>
