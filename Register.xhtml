<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition template="/JobsTemplate.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core">
    <ui:define name="content">
        <h2>Create an Account</h2>
        <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 500px;">
            <h:form>

                <!-- Show ALL messages including validation errors -->
                <h:messages style="color: red; font-weight: bold;" />

                <h:outputLabel for="username" value="Username:" />
                <h:inputText id="username" value="#{registerBean.username}" required="true" />
                <h:message for="username" style="color: red;" />

                <h:outputLabel for="email" value="Email Address:" />
                <h:inputText id="email" value="#{registerBean.email}" required="true" />
                <h:message for="email" style="color: red;" />

                <h:outputLabel for="password" value="Password:" />
                <h:inputSecret id="password" value="#{registerBean.password}" required="true" />
                <h:message for="password" style="color: red;" />

                <h:outputLabel for="dob" value="Date of Birth (DD/MM/YYYY):" />
                <h:inputText id="dob" value="#{registerBean.dateOfBirthInput}" 
                             placeholder="e.g. 31/01/1999" />

                <div style="margin-top: 25px;">
                    <h:commandButton value="Register Now"
                                     action="#{registerBean.register}"
                                     styleClass="btn-primary"
                                     style="margin-top: 0; width: 100%;" />
                </div>

                <p style="margin-top: 20px; font-size: 0.9rem; text-align: center;">
                    Already have an account?
                    <h:link outcome="/Login.xhtml" value="Login here"
                            style="color: #2563eb; font-weight: 600; text-decoration: none;" />
                </p>
            </h:form>
        </div>
    </ui:define>
</ui:composition>
