<!DOCTYPE html>
<ui:composition template="/JobsTemplate.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

    <ui:define name="content">

        <!-- Logged in view -->
        <h:panelGroup rendered="#{loginBean.loggedIn}">

            <!-- Header -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2>Available Jobs</h2>
                <h:form>
                    <h:commandButton value="+ Post a Job"
                                     action="#{jobBean.prepareCreate}"
                                     styleClass="btn-primary"
                                     style="margin-top: 0;" />
                </h:form>
            </div>

            <!-- Search -->
            <h:form id="searchForm" style="margin-bottom: 20px;">
            <div style="display: flex; gap: 10px; align-items: center;">
                <h:inputText value="#{jobBean.searchText}"
                     pt:placeholder="Search by title or location..."
                     style="padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; width: 300px;">
                    <f:ajax event="keyup"
                    execute="@this"
                    render=":jobsForm:jobsTable"
                    delay="300" />
                    </h:inputText>
             </div>
             </h:form>       

            <!-- Jobs Table -->
            <h:form id="jobsForm">
                <h:dataTable id="jobsTable"
                             value="#{jobBean.jobs}"
                             var="job"
                             styleClass="modern-table">

                    <!-- Title -->
                    <h:column>
                        <f:facet name="header">Title</f:facet>
                        <span style="font-weight: 600;">#{job.jobTitle}</span>
                    </h:column>

                    <!-- Job Type -->
                    <h:column>
                        <f:facet name="header">Type</f:facet>
                        #{job.formattedJobType}
                    </h:column>

                    <!-- Location -->
                    <h:column>
                        <f:facet name="header">Location</f:facet>
                        #{job.location}
                    </h:column>

                    <!-- Salary -->
                    <h:column>
                        <f:facet name="header">Salary</f:facet>
                        £<h:outputText value="#{job.salary}">
                            <f:convertNumber pattern="#,##0" />
                        </h:outputText>
                    </h:column>

                    <!-- Start Date -->
                    <h:column>
                        <f:facet name="header">Start Date</f:facet>
                        #{job.formattedJobBegins}
                    </h:column>

                    <!-- Actions -->
                    <h:column>
                        <f:facet name="header">Actions</f:facet>

                        <!-- Track -->
                        <h:commandLink action="#{jobBean.trackJob(job)}"
                                       style="color: #2563eb; text-decoration: none; margin-right: 15px;">
                            <i class="fa-solid fa-bookmark"></i> Track
                        </h:commandLink>

                        <!-- Owner-only actions -->
                        <h:panelGroup rendered="#{jobBean.isOwner(job)}">

                            <!-- Edit -->
                            <h:commandLink action="#{jobBean.prepareEdit(job)}"
                                           style="color: #16a34a; text-decoration: none; margin-right: 15px;">
                                <i class="fa-solid fa-pen"></i> Edit
                            </h:commandLink>

                            <!-- Delete (AJAX) -->
                            <h:commandLink action="#{jobBean.deleteJob(job)}"
                                           style="color: #dc2626; text-decoration: none;">
                                <f:ajax execute="@this" render="jobsForm" />
                                <i class="fa-solid fa-trash"></i> Delete
                            </h:commandLink>

                        </h:panelGroup>

                    </h:column>

                </h:dataTable>
            </h:form>

        </h:panelGroup>

        <!-- Not logged in -->
        <h:panelGroup rendered="#{not loginBean.loggedIn}">
            <div style="text-align: center; padding: 60px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 600px; margin: 40px auto;">
                <i class="fa-solid fa-lock" style="font-size: 3rem; color: #cbd5e1; margin-bottom: 20px;"></i>
                <h2 style="color: #1e3a8a;">Access Restricted</h2>
                <p style="color: #64748b; margin-bottom: 30px;">You need to be logged in to view available jobs.</p>

                <div style="display: flex; justify-content: center; gap: 15px;">
                    <h:link outcome="/Login.xhtml"
                            value="Login"
                            styleClass="btn-primary"
                            style="text-decoration: none;" />

                    <h:link outcome="/Register.xhtml"
                            value="Register"
                            styleClass="btn-primary"
                            style="text-decoration: none; background: #16a34a;" />
                </div>
            </div>
        </h:panelGroup>

    </ui:define>
</ui:composition>
