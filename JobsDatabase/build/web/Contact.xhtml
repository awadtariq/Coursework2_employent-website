<!DOCTYPE html>
<ui:composition template="/JobsTemplate.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="content">
        <div style="display: flex; flex-direction: column; align-items: center; padding-top: 20px;">

            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="color: #1e293b; margin-bottom: 10px;">Contact Us</h2>
                <p style="color: #64748b;">Have questions? Send us a message and we'll get back to you shortly.</p>
            </div>

            <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px;">
                <h:form id="contactForm">
                    <h:messages globalOnly="true" errorClass="errorMessage" infoClass="successMessage" />

                    <div style="margin-bottom: 20px;">
                        <h:outputLabel for="name" value="Your Name:" style="display: block; margin-bottom: 8px; font-weight: 600;" />
                        <h:inputText id="name"
                                     value="#{contactBean.name}"
                                     required="true"
                                     requiredMessage="Please enter your name." />
                        <h:message for="name" styleClass="errorMessage" />
                    </div>

                    <div style="margin-bottom: 20px;">
                        <h:outputLabel for="email" value="Your Email:" style="display: block; margin-bottom: 8px; font-weight: 600;" />
                        <h:inputText id="email"
                                     value="#{contactBean.email}"
                                     required="true"
                                     requiredMessage="Please enter your email." />
                        <h:message for="email" styleClass="errorMessage" />
                    </div>

                    <div style="margin-bottom: 25px;">
                        <h:outputLabel for="message" value="Message:" style="display: block; margin-bottom: 8px; font-weight: 600;" />
                        <h:inputTextarea id="message"
                                         value="#{contactBean.message}"
                                         rows="6"
                                         required="true"
                                         requiredMessage="Please enter your message." />
                        <h:message for="message" styleClass="errorMessage" />
                    </div>

                    <h:commandButton value="Send Message"
                                     action="#{contactBean.sendMessage}"
                                     styleClass="btn-primary"
                                     style="width: 100%;" />
                </h:form>
            </div>

        </div>
    </ui:define>

</ui:composition>
