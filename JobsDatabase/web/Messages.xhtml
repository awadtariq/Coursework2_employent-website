<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition template="/JobsTemplate.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="content">
        <h2>Your Messages</h2>

        <h:form>
            <h:dataTable id="messagesTable" value="#{messageBean.messages}" var="msg" styleClass="modern-table" rendered="#{not empty messageBean.messages}">
                
                <h:column>
                    <f:facet name="header">From</f:facet>
                    #{msg.sender}
                </h:column>
                
                <h:column>
                    <f:facet name="header">Subject</f:facet>
                    #{msg.subject}
                </h:column>
                
                <h:column>
                    <f:facet name="header">Content</f:facet>
                    #{msg.content}
                </h:column>

                <h:column>
                    <f:facet name="header">Actions</f:facet>
                    <h:commandLink value="Delete" action="#{messageBean.delete(msg)}" style="color: #dc2626; text-decoration: none; font-weight: 500;" />
                </h:column>

            </h:dataTable>

            <h:outputText value="You have no messages." rendered="#{empty messageBean.messages}" style="color: #475569; font-style: italic;" />
        </h:form>

    </ui:define>

</ui:composition>
