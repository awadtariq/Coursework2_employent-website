<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition template="/JobsTemplate.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html">
    
    <ui:define name="content">
        <h2>Login</h2>

        <h:form>
            <h:messages showDetail="true" errorClass="errorMessage" infoClass="successMessage" layout="table"/>

            <h:outputLabel for="username" value="Username:" />
            <h:inputText id="username" value="#{loginBean.username}" required="true" />
            <h:message for="username" styleClass="errorMessage" />

            <h:outputLabel for="password" value="Password:" />
            <h:inputSecret id="password" value="#{loginBean.password}" required="true" />
            <h:message for="password" styleClass="errorMessage" />

            <h:commandButton value="Login" action="#{loginBean.login}" styleClass="btn-primary" />
        </h:form>

    </ui:define>

</ui:composition>
