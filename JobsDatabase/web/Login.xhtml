<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition template="/JobsTemplate.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <ui:define name="content">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh;">
            
            <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
                <h2 style="text-align: center; margin-bottom: 30px;">Login</h2>
                
                <h:form id="loginForm">
                    <h:messages globalOnly="true" errorClass="errorMessage" infoClass="successMessage" />

                    <h:outputLabel for="username" value="Username:" style="display: block; margin-bottom: 8px; font-weight: 600;" />
                    <h:inputText id="username" value="#{loginBean.username}" required="true" style="margin-bottom: 20px;" />

                    <h:outputLabel for="password" value="Password:" style="display: block; margin-bottom: 8px; font-weight: 600;" />
                    <h:inputSecret id="password" value="#{loginBean.password}" required="true" style="margin-bottom: 20px;" />

                    <h:commandButton value="Login" action="#{loginBean.login}" styleClass="btn-primary" style="width: 100%; margin-top: 10px;" />
                    
                    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #64748b;">
                        New here? <h:link outcome="/Register.xhtml" value="Create an account" style="color: #2563eb; font-weight: 600;" />
                    </p>
                </h:form>
            </div>
        </div>
    </ui:define>

</ui:composition>
