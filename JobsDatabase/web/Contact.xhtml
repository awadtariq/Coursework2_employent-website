<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition template="/JobsTemplate.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="content">
        <h2>Contact Us</h2>
        <p style="color: #64748b; margin-bottom: 25px;">Have questions? Send us a message and we'll get back to you shortly.</p>

        <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 600px;">
            <h:form id="contactForm">
                <h:messages globalOnly="true" errorClass="errorMessage" infoClass="successMessage" />

                <h:outputLabel for="name" value="Your Name:" />
                <h:inputText id="name" value="#{contactBean.name}" required="true" requiredMessage="Please enter your name." />
                <h:message for="name" styleClass="errorMessage" />

                <h:outputLabel for="email" value="Your Email:" />
                <h:inputText id="email" value="#{contactBean.email}" required="true" requiredMessage="Please enter your email." />
                <h:message for="email" styleClass="errorMessage" />

                <h:outputLabel for="subject" value="Subject:" />
                <h:inputText id="subject" value="#{contactBean.subject}" required="true" requiredMessage="Please enter a subject." />
                <h:message for="subject" styleClass="errorMessage" />

                <h:outputLabel for="message" value="Message:" />
                <h:inputTextarea id="message" value="#{contactBean.message}" rows="6" required="true" requiredMessage="Please enter a message." />
                <h:message for="message" styleClass="errorMessage" />

                <div style="margin-top: 25px;">
                    <h:commandButton value="Send Message" action="#{contactBean.sendMessage}" styleClass="btn-primary" style="margin-top: 0;" />
                </div>
            </h:form>
        </div>
    </ui:define>
</ui:composition>
