<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition template="/JobsTemplate.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="top">
        <h1>Jobs Pool</h1>
    </ui:define>

    <ui:define name="left">
        <h:link outcome="/index.xhtml" value="Home" />
        <h:link outcome="/Login.xhtml" value="Login" />
        <h:link outcome="/Jobs.xhtml" value="View Jobs" />
        <h:link outcome="/MyJobs.xhtml" value="My Jobs" />
        <h:link outcome="/Register.xhtml" value="Register" />
        <h:link outcome="/Contact.xhtml" value="Contact" />
        <h:link outcome="/Messages.xhtml" value="Messages" />
        <h:link outcome="/About.xhtml" value="About Us" />
    </ui:define>

    <ui:define name="content">
        <h2>Edit Job</h2>

        <h:form>
            <h:messages style="color:red" />

            <h:outputLabel value="Job Title:" />
            <h:inputText value="#{jobBean.selectedJob.jobTitle}" required="true" />
            <br/><br/>

            <h:outputLabel value="Description:" />
            <h:inputText value="#{jobBean.selectedJob.description}" required="true" />
            <br/><br/>

            <h:outputLabel value="Job Type:" />
            <h:selectOneMenu value="#{jobBean.selectedJob.jobType}" required="true">
            <f:selectItem itemValue="JOB" itemLabel="Job" />
            <f:selectItem itemValue="INTERNSHIP" itemLabel="Internship" />
            <f:selectItem itemValue="VOLUNTEER" itemLabel="Volunteer" />
            </h:selectOneMenu>
            <br/><br/>

            <h:outputLabel value="Salary:" />
            <h:inputText value="#{jobBean.salaryInput}" />
            <br/><br/>

            <h:outputLabel value="Location:" />
            <h:inputText value="#{jobBean.selectedJob.location}" required="true" />
            <br/><br/>

            <h:outputLabel value="Job Begins (yyyy-MM-dd):" />
            <h:inputText value="#{jobBean.jobBeginsInput}" />
            <br/><br/>

            <h:outputLabel value="Status:" />
            <h:inputText value="#{jobBean.selectedJob.status}" />
            <br/><br/>

            <h:outputLabel value="Contact Email:" />
            <h:inputText value="#{jobBean.selectedJob.contactEmail}" />
            <br/><br/>

            <h:commandButton value="Update Job" action="#{jobBean.updateJob}" />
        </h:form>
    </ui:define>

</ui:composition>
