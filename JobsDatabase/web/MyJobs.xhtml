<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition template="/JobsTemplate.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="content">
        <h2>My Tracked Jobs</h2>

        <h:form>
            <h:messages globalOnly="true" errorClass="errorMessage" infoClass="successMessage" />

            <h:dataTable id="myJobsTable" value="#{jobBean.trackedJobs}" var="item" styleClass="modern-table" rendered="#{not empty jobBean.trackedJobs}">
                
                <h:column>
                    <f:facet name="header">Job Title</f:facet>
                    #{item.job.jobTitle}
                </h:column>
                
                <h:column>
                    <f:facet name="header">Location</f:facet>
                    #{item.job.location}
                </h:column>

                <h:column>
                    <f:facet name="header">Type</f:facet>
                    #{item.job.jobType}
                </h:column>

                <h:column>
                    <f:facet name="header">Actions</f:facet>
                    <h:commandLink value="Remove" action="#{jobBean.untrackJob(item)}" 
                                   style="color: #dc2626; text-decoration: none; font-weight: 500;" />
                </h:column>

            </h:dataTable>

            <h:outputText value="You haven't tracked any jobs yet." rendered="#{empty jobBean.trackedJobs}" 
                          style="color: #475569; font-style: italic; display: block; margin-top: 15px;" />
            
        </h:form>
    </ui:define>

</ui:composition>
