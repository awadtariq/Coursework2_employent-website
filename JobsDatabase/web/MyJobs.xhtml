<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition template="/JobsTemplate.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="top">
        <h1>My Tracked Jobs</h1>
    </ui:define>

    <ui:define name="left">
        <h:link outcome="/index.xhtml" value="Home" />
        <h:link outcome="/Login.xhtml" value="Login" />
        <h:link outcome="/Jobs.xhtml" value="View Jobs" />
        <h:link outcome="/MyJobs.xhtml" value="My Jobs" />
        <h:link outcome="/Register.xhtml" value="Register" />
        <h:link outcome="/Contact.xhtml" value="Contact" />
        <h:link outcome="/Messages.xhtml" value="Messages" />
        <h:link outcome="/About.xhtml" value="About Us" />
    </ui:define>

    <ui:define name="content">
        <ui:fragment rendered="#{loginBean.loggedIn}">
            <h2>Jobs You Are Tracking</h2>
            <h:form>
                <h:dataTable value="#{jobBean.trackedJobs}" var="trackedJob" border="1" styleClass="jobTable">
                    <h:column>
                        <f:facet name="header">Title</f:facet>
                        #{trackedJob.job.jobTitle}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Type</f:facet>
                        #{trackedJob.job.jobTypeDisplay}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Location</f:facet>
                        #{trackedJob.job.location}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Salary</f:facet>
                        #{trackedJob.job.salary}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Status</f:facet>
                        #{trackedJob.job.status}
                    </h:column>
                    <h:column>
                        <f:facet name="header">Actions</f:facet>
                        <h:commandButton value="Remove"
                            action="#{jobBean.untrackJob(trackedJob)}" />
                    </h:column>
                </h:dataTable>
            </h:form>
        </ui:fragment>

        <ui:fragment rendered="#{not loginBean.loggedIn}">
            <h2>Access Denied</h2>
            <p>You need to be logged in to see your tracked jobs.</p>
            <h:link outcome="/Login.xhtml" value="Login" />
        </ui:fragment>
    </ui:define>

</ui:composition>
