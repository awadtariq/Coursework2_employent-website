<?xml version='1.0' encoding='UTF-8' ?> 
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

    <h:head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <h:outputStylesheet library="css" name="style.css"/>
        <title>Jobs Pool</title>
    </h:head>

    <h:body>


        <div id="top" class="top">
    <ui:insert name="top">Top</ui:insert>

    <!-- Logged-in view -->
    <h:panelGroup rendered="#{loginBean.loggedIn and loginBean.currentUser != null}" style="float:right;">
        <h:outputText value="Hello, #{loginBean.currentUser.username}" />
        <h:outputText value=" | " />
        <h:form style="display:inline;">
            <h:commandLink value="Logout" action="#{loginBean.logout}" />
        </h:form>
    </h:panelGroup>

    <!-- Logged-out view -->
    <h:panelGroup rendered="#{not loginBean.loggedIn}" style="float:right;">
        <h:link outcome="/Login.xhtml" value="Login" />
        <h:outputText value=" | " />
        <h:link outcome="/Register.xhtml" value="Register" />
    </h:panelGroup>
        </div>
        <div>
            <div id="left">
                <ui:insert name="left">Left</ui:insert>
            </div>
            <div id="content" class="left_content">
                <ui:insert name="content">Content</ui:insert>
            </div>
        </div>
    </h:body>

</html>
