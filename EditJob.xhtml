<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition template="/JobsTemplate.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="content">
        <h2>Edit Job Details</h2>

        <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 500px;">
            <h:form>
                <h:messages globalOnly="true" errorClass="errorMessage" infoClass="successMessage" />

                <h:outputLabel for="title" value="Job Title:" />
                <h:inputText id="title" value="#{jobBean.selectedJob.jobTitle}" required="true" />

                <h:outputLabel for="salary" value="Salary:" />
                <h:inputText id="salary" value="#{jobBean.salaryInput}" />

                <h:outputLabel for="begins" value="Begins (yyyy-MM-dd):" />
                <h:inputText id="begins" value="#{jobBean.jobBeginsInput}" />

                <h:outputLabel for="description" value="Description:" />
                <h:inputTextarea id="description" value="#{jobBean.selectedJob.description}" rows="5" />

                <div style="margin-top: 25px; display: flex; align-items: center;">
                    <h:commandButton value="Save Changes" action="#{jobBean.updateJob}" styleClass="btn-primary" style="margin-top: 0;" />
                    <h:link outcome="/Jobs.xhtml" value="Cancel" style="margin-left: 20px; color: #64748b; text-decoration: none;" />
                </div>
            </h:form>
        </div>
    </ui:define>

</ui:composition>
